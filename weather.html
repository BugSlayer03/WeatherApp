<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WeatherNow</title>
    <link rel="stylesheet" href="weather.css">
</head>

<body>
    <div class="heading">
        <div class="name">WeatherNow</div>
        <div class="input_wrapper">
            <input type="text" placeholder="  Enter the city.." class="city_input">
        </div>

    </div>

    <div class="content">
        <div class="details">
            <div class="location"></div>
            <div class="date"></div>
            <div class="temp">
                
            </div>
            <div class="condition">
                <p></p>
                <img src="" alt="" class="condImg">

            </div>

            <div class="wind">
                <p class="w1"></p>

            </div>

            <hr>

            <div class="lastUpdated">

            </div>
        </div>
    </div>

    <script src="weather.js"></script>
</body>

</html>
